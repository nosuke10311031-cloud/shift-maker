<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>シフトメーカー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Zen Kaku Gothic New',sans-serif;background:#f4f1ea;background-image:radial-gradient(#e3ddd0 1px,transparent 1px);background-size:22px 22px;color:#2b2724;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 16px}
.wrap{max-width:460px;width:100%}
h1{font-family:'Zen Maru Gothic',sans-serif;font-weight:900;font-size:28px;display:flex;align-items:center;gap:12px;justify-content:center}
h1 .dot{width:13px;height:13px;border-radius:50%;background:#d8602e;box-shadow:0 0 0 4px #fbe9df}
.sub{color:#8a8378;font-size:13px;text-align:center;margin-top:6px;margin-bottom:8px}
.menu{display:flex;flex-direction:column;gap:12px;margin-top:22px}
a.tile{display:flex;align-items:center;gap:14px;text-decoration:none;background:#fffdf8;border:1px solid #e3ddd0;border-radius:16px;padding:18px 18px;box-shadow:0 1px 2px rgba(43,39,36,.06),0 8px 24px rgba(43,39,36,.05);transition:transform .08s,border-color .15s}
a.tile:hover{border-color:#d8602e;transform:translateY(-1px)}
a.tile:active{transform:translateY(1px)}
.tile .ico{flex:none;width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;background:#fbe9df}
.tile .tx{min-width:0}
.tile .ti{font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:16px;color:#2b2724}
.tile .ds{font-size:12px;color:#8a8378;margin-top:1px}
.tile .arrow{margin-left:auto;color:#d8602e;font-weight:700;font-size:18px}
.tile.staff .ico{background:#e3f3eb}
.tile.admin .ico{background:#fbf0d8}
.tile.view .ico{background:#f0ece2}
.foot{color:#a89f90;font-size:11px;text-align:center;margin-top:22px;line-height:1.6}
</style>
</head>
<body>
<div class="wrap">
  <h1><span class="dot"></span>シフトメーカー</h1>
  <div class="sub">バイトのシフト自動作成・共有ツール</div>
  <div class="menu">
    <a class="tile staff" href="staff.html">
      <span class="ico">📝</span>
      <span class="tx"><span class="ti">希望を入力する</span><span class="ds">バイトの方 ／ 希望→提出コードを作成</span></span>
      <span class="arrow">→</span>
    </a>
    <a class="tile admin" href="admin.html">
      <span class="ico">🗓️</span>
      <span class="tx"><span class="ti">シフトを作成する</span><span class="ds">管理者の方 ／ 取り込み→自動作成→共有</span></span>
      <span class="arrow">→</span>
    </a>
    <a class="tile view" href="view.html">
      <span class="ico">👀</span>
      <span class="tx"><span class="ti">シフトを確認する</span><span class="ds">共有リンクが開けないとき ／ コードを貼り付け</span></span>
      <span class="arrow">→</span>
    </a>
  </div>
  <div class="foot">サーバー不要。データはコードとリンクで受け渡しします。<br>入力内容は各自のブラウザに保存されます。</div>
</div>
</body>
</html>
