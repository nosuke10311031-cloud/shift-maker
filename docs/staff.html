<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>シフト希望入力</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{--bg:#f4f1ea;--paper:#fffdf8;--ink:#2b2724;--muted:#8a8378;--line:#e3ddd0;--accent:#d8602e;--accent-soft:#fbe9df;
    --maru:#2f9e6f;--maru-bg:#e3f3eb;--sankaku:#d99a26;--sankaku-bg:#fbf0d8;--batsu:#c2bcb1;--batsu-bg:#efece5;--weekend:#bb4d6e;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Zen Kaku Gothic New',sans-serif;background:var(--bg);background-image:radial-gradient(var(--line) 1px,transparent 1px);background-size:22px 22px;color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1100px;margin:0 auto;padding:20px 14px 70px}
  h1{font-family:'Zen Maru Gothic',sans-serif;font-weight:900;font-size:24px;display:flex;align-items:center;gap:10px}
  h1 .dot{width:12px;height:12px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 4px var(--accent-soft)}
  .sub{color:var(--muted);font-size:13px;margin-top:4px}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:0 6px 18px rgba(43,39,36,.05);margin-top:16px}
  .card h2{font-family:'Zen Maru Gothic',sans-serif;font-size:16px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
  .card h2 .num{background:var(--ink);color:var(--paper);width:24px;height:24px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:13px;flex:none}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  label.fl{font-size:12px;color:var(--muted);display:flex;flex-direction:column;gap:4px}
  input,select{font-family:inherit;font-size:14px;padding:8px 10px;border:1px solid var(--line);border-radius:9px;background:var(--paper);color:var(--ink)}
  input:focus,select:focus{outline:none;border-color:var(--accent)}
  input[type=number]{width:72px}
  .btn{font-family:inherit;font-weight:700;font-size:14px;padding:10px 18px;border:none;border-radius:10px;background:var(--ink);color:var(--paper);cursor:pointer}
  .btn.accent{background:var(--accent)}
  .btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
  .btn.sm{padding:6px 12px;font-size:12px}
  .hint{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.5}
  .legend{display:flex;gap:12px;font-size:12px;color:var(--muted);flex-wrap:wrap;align-items:center;margin-bottom:8px}
  .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
  /* カレンダー（全幅・横スクロールなし） */
  .cal{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:4px;width:100%}
  .ch{text-align:center;font-size:12px;font-weight:700;color:var(--muted);padding:3px 0}
  .ch.we{color:var(--weekend)}
  .icell{border:1px solid var(--line);border-radius:8px;background:var(--paper);min-height:64px;padding:3px;display:flex;flex-direction:column;gap:2px;align-items:center}
  .icell.we{background:#fdf7f5}.icell.blank{background:transparent;border:none}
  .iday{font-family:'Zen Maru Gothic';font-weight:700;font-size:12px;align-self:flex-start}
  .iday .wd{font-size:9px;color:var(--muted);margin-left:2px}
  .iday.we .wd{color:var(--weekend)}
  .ipref{width:100%;text-align:center;font-weight:700;font-size:20px;border-radius:6px;padding:2px 0;cursor:pointer;user-select:none}
  .ipref.pm{color:var(--maru);background:var(--maru-bg)}
  .ipref.ps{color:var(--sankaku);background:var(--sankaku-bg)}
  .ipref.px{color:var(--batsu);background:var(--batsu-bg)}
  .itime{width:100%;font-size:10px;border:1px solid var(--line);border-radius:6px;padding:3px 2px;background:#fff;color:var(--accent);font-weight:700;cursor:pointer;text-align:center}
  .itime.empty{color:var(--muted);font-weight:400}
  .itime:disabled,.itime.dis{background:#efece5;color:#c2bcb1;cursor:default;border-style:dashed}
  /* 提出コード */
  .codebox{background:#f7f4ec;border:1px dashed var(--line);border-radius:10px;padding:12px;font-family:monospace;font-size:12px;word-break:break-all;line-height:1.5;max-height:120px;overflow:auto}
  .qrwrap{display:flex;gap:18px;align-items:flex-start;flex-wrap:wrap;margin-top:12px}
  #qrbox{background:#fff;padding:8px;border-radius:10px;border:1px solid var(--line)}
  .msg{margin-top:10px;padding:10px 14px;border-radius:10px;font-size:13px}
  .msg.ng{background:#fbe4e4;color:#a33}
  /* 時刻ホイール */
  .ov{position:fixed;inset:0;z-index:999;background:rgba(20,16,12,.18)}
  .pop{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:1000;background:var(--paper);border:1px solid var(--line);border-radius:14px;box-shadow:0 12px 40px rgba(43,39,36,.28);padding:14px;width:min(300px,92vw)}
  .pop .ttl{font-size:12px;color:var(--muted);margin-bottom:10px;text-align:center}
  .wheels{position:relative;display:flex;gap:6px;align-items:center;justify-content:center}
  .band{position:absolute;top:50%;transform:translateY(-50%);height:38px;left:30px;right:30px;background:var(--accent-soft);border-radius:9px;pointer-events:none}
  .colon{font-size:20px;font-weight:700;z-index:1}
  .wheel{position:relative;z-index:1;height:114px;width:78px;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none;text-align:center}
  .wheel::-webkit-scrollbar{display:none}
  .wpad{height:38px}
  .witem{height:38px;line-height:38px;scroll-snap-align:center;font-size:19px;color:#b8b1a4;cursor:pointer;font-variant-numeric:tabular-nums}
  .witem.sel{color:var(--accent);font-weight:700}
  .actions{display:flex;justify-content:space-between;margin-top:12px;gap:8px}
  .actions button{font-family:inherit;font-size:14px;border:none;border-radius:9px;padding:9px 18px;cursor:pointer;font-weight:700}
  .actions .clr{background:transparent;color:var(--muted);border:1px solid var(--line)}
  .actions .ok{background:var(--accent);color:#fff;flex:1}
  .save-note{font-size:11px;color:var(--muted)}
</style>
</head>
<body>
<div class="wrap" id="wrap">
  <h1><span class="dot"></span>シフト希望入力</h1>
  <div class="sub">あなたの希望を入力して、提出コードを管理者に送ってください。</div>

  <div class="card">
    <h2><span class="num">1</span>あなたの情報</h2>
    <div class="row">
      <label class="fl">名前<input id="i-name" placeholder="例：佐藤"></label>
      <label class="fl">年<input id="i-year" type="number"></label>
      <label class="fl">月<select id="i-month"></select></label>
      <label class="fl">連勤禁止<input id="i-nc" type="number" min="0" value="0"></label>
    </div>
    <div class="hint">連勤禁止：「3」で3連勤を禁止（＝最大2連勤）。制限なしは 0。月は管理者の指示に合わせてください。</div>
  </div>

  <div class="card">
    <h2><span class="num">2</span>希望を入力</h2>
    <div class="legend">
      <span><b class="ipref pm" style="font-size:12px;padding:1px 6px">◯</b> 可能</span>
      <span><b class="ipref ps" style="font-size:12px;padding:1px 6px">△</b> 他にいなければ可</span>
      <span><b class="ipref px" style="font-size:12px;padding:1px 6px">×</b> 不可</span>
      <span>◯をタップで切替・下の時刻は「◯時以降可」</span>
    </div>
    <div class="toolbar">
      <button class="btn sm ghost" data-act="fill" data-v="◯">全部◯</button>
      <button class="btn sm ghost" data-act="fill" data-v="×">全部×</button>
      <button class="btn sm ghost" data-act="fit">🔍 全体表示</button>
    </div>
    <div class="cal" id="cal"></div>
    <div class="hint">入力内容はこの端末に自動保存されます。あとで直して再提出もできます。</div>
  </div>

  <div class="card">
    <h2><span class="num">3</span>提出する</h2>
    <button class="btn accent" data-act="build">提出コードを作成 ▶</button>
    <div id="sub-area"></div>
  </div>
</div>

<script>
(function(){
  "use strict";
  var WD=['日','月','火','水','木','金','土'];
  var HEADS=['日','月','火','水','木','金','土'];
  var HOURS=[];for(var i=0;i<24;i++)HOURS.push(('0'+i).slice(-2));
  var MINS=['00','15','30','45'];
  var WH=38;
  function isWE(dow){return dow===5||dow===6||dow===0;}
  function dim(y,m){return new Date(y,m,0).getDate();}
  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function encodeSubmission(obj){try{return btoa(String.fromCharCode.apply(null,new TextEncoder().encode(JSON.stringify(obj))));}catch(e){return '';}}

  var store={
    load:function(){try{var r=localStorage.getItem('shiftmaker_staff');return r?JSON.parse(r):null;}catch(e){return null;}},
    save:function(s){try{localStorage.setItem('shiftmaker_staff',JSON.stringify(s));}catch(e){}}
  };
  var now=new Date();
  var S=store.load()||{name:'',year:now.getFullYear(),month:now.getMonth()+1,nc:0,prefs:{},avail:{}};
  function persist(){store.save(S);}

  // ---- 情報フォーム初期化 ----
  var elName=document.getElementById('i-name'),elYear=document.getElementById('i-year'),elMonth=document.getElementById('i-month'),elNc=document.getElementById('i-nc');
  for(var mo=1;mo<=12;mo++){var op=document.createElement('option');op.value=mo;op.textContent=mo+'月';elMonth.appendChild(op);}
  elName.value=S.name;elYear.value=S.year;elMonth.value=S.month;elNc.value=S.nc;
  elName.oninput=function(){S.name=this.value;persist();};
  elYear.onchange=function(){S.year=parseInt(this.value)||S.year;persist();renderCal();};
  elMonth.onchange=function(){S.month=parseInt(this.value);persist();renderCal();};
  elNc.onchange=function(){S.nc=Math.max(0,parseInt(this.value)||0);persist();};

  // ---- 希望ヘルパ ----
  function pref(d){return S.prefs[d]||'×';}
  function avail(d){return S.avail[d]||'';}
  function prefCls(p){return p==='◯'?'pm':p==='△'?'ps':'px';}

  // ---- カレンダー描画 ----
  function renderCal(){
    var y=S.year,m=S.month,n=dim(y,m);
    var first=new Date(y,m-1,1).getDay();var off=first;
    var h='';
    for(var k=0;k<7;k++){h+='<div class="ch'+(k===0||k>=5?' we':'')+'">'+HEADS[k]+'</div>';}
    for(var b=0;b<off;b++){h+='<div class="icell blank"></div>';}
    for(var d=1;d<=n;d++){
      var dow=new Date(y,m-1,d).getDay();var we=isWE(dow);var p=pref(d);var av=avail(d);
      h+='<div class="icell'+(we?' we':'')+'">';
      h+='<div class="iday'+(we?' we':'')+'">'+d+'<span class="wd">'+WD[dow]+'</span></div>';
      h+='<div class="ipref '+prefCls(p)+'" data-act="pref" data-d="'+d+'">'+p+'</div>';
      if(p==='×'){
        h+='<div class="itime dis">--:--</div>';
      }else{
        h+='<div class="itime'+(av?'':' empty')+'" data-act="time" data-d="'+d+'">'+(av?av+'〜':'--:--')+'</div>';
      }
      h+='</div>';
    }
    document.getElementById('cal').innerHTML=h;
  }

  function cyclePref(d){
    var cur=pref(d);var next=cur==='×'?'◯':cur==='◯'?'△':'×';
    if(next==='×')delete S.prefs[d];else S.prefs[d]=next;
    persist();renderCal();
  }
  function fillAll(v){
    var n=dim(S.year,S.month);S.prefs={};
    if(v!=='×'){for(var d=1;d<=n;d++)S.prefs[d]=v;}
    persist();renderCal();
  }

  // ---- 時刻ホイール ----
  var curD=null,wh='17',wm='00';
  function openWheel(d){
    curD=d;var v=avail(d);wh=v?v.split(':')[0]:'17';wm=v?v.split(':')[1]:'00';
    var ov=document.createElement('div');ov.className='ov';ov.id='ov';ov.onclick=closeWheel;
    var pop=document.createElement('div');pop.className='pop';pop.id='pop';
    pop.innerHTML='<div class="ttl">時刻を選択（上下にスライド・15分刻み）</div>'
      +'<div class="wheels"><div class="band"></div>'
      +'<div class="wheel" id="wh-h"></div><span class="colon">:</span><div class="wheel" id="wh-m"></div></div>'
      +'<div class="actions"><button class="clr" id="w-clr">クリア</button><button class="ok" id="w-ok">決定</button></div>';
    document.body.appendChild(ov);document.body.appendChild(pop);
    buildWheel('wh-h',HOURS,wh,function(v){wh=v;});
    buildWheel('wh-m',MINS,wm,function(v){wm=v;});
    document.getElementById('w-clr').onclick=function(){delete S.avail[curD];persist();renderCal();closeWheel();};
    document.getElementById('w-ok').onclick=function(){S.avail[curD]=wh+':'+wm;persist();renderCal();closeWheel();};
  }
  function closeWheel(){var o=document.getElementById('ov'),p=document.getElementById('pop');if(o)o.remove();if(p)p.remove();}
  function buildWheel(id,items,val,onSet){
    var el=document.getElementById(id);var h='<div class="wpad"></div>';
    for(var i=0;i<items.length;i++){h+='<div class="witem'+(items[i]===val?' sel':'')+'" data-v="'+items[i]+'">'+items[i]+'</div>';}
    h+='<div class="wpad"></div>';el.innerHTML=h;
    var idx=items.indexOf(val);if(idx>=0)el.scrollTop=idx*WH;
    var to=null;
    el.addEventListener('scroll',function(){
      clearTimeout(to);to=setTimeout(function(){
        var i=Math.round(el.scrollTop/WH);i=Math.max(0,Math.min(items.length-1,i));
        el.scrollTop=i*WH;onSet(items[i]);
        var ws=el.getElementsByClassName('witem');for(var j=0;j<ws.length;j++)ws[j].classList.toggle('sel',ws[j].dataset.v===items[i]);
      },110);
    });
    el.addEventListener('click',function(e){var t=e.target.closest('.witem');if(!t)return;var i=items.indexOf(t.dataset.v);el.scrollTo({top:i*WH,behavior:'smooth'});onSet(t.dataset.v);var ws=el.getElementsByClassName('witem');for(var j=0;j<ws.length;j++)ws[j].classList.toggle('sel',ws[j].dataset.v===t.dataset.v);});
  }

  // ---- 提出コード ----
  function buildCode(){
    var area=document.getElementById('sub-area');
    if(!S.name.trim()){area.innerHTML='<div class="msg ng">先に名前を入力してください。</div>';return;}
    var obj={t:'shift-pref',name:S.name.trim(),y:S.year,m:S.month,nc:S.nc||0,p:S.prefs,a:S.avail};
    var code=encodeSubmission(obj);
    area.innerHTML='<div class="qrwrap"><div style="flex:1 1 280px">'
      +'<div class="hint" style="margin-top:0;margin-bottom:6px">このコードをコピーして管理者にLINE等で送ってください：</div>'
      +'<div class="codebox" id="codebox">'+esc(code)+'</div>'
      +'<button class="btn sm" id="copybtn" style="margin-top:8px">コードをコピー</button></div>'
      +'<div><div class="hint" style="margin-top:0;margin-bottom:6px">QRで渡す場合：</div><div id="qrbox"></div></div></div>'
      +'<div class="hint">入力を直したら、もう一度このボタンを押して新しいコードを送ってください。</div>';
    document.getElementById('copybtn').onclick=function(){if(navigator.clipboard)navigator.clipboard.writeText(code);this.textContent='コピーしました';};
    var qb=document.getElementById('qrbox');
    if(window.QRCode){try{new QRCode(qb,{text:code,width:150,height:150,correctLevel:QRCode.CorrectLevel.L});}catch(e){qb.textContent='(QR生成不可)';}}
    else{qb.textContent='(QR利用不可・コードをコピーしてください)';}
  }

  // ---- 全体表示 ----
  function toggleFit(){
    var w=document.getElementById('wrap');
    if(w.style.transform){w.style.transform='';w.style.transformOrigin='';return;}
    var sc=(window.innerHeight-16)/w.scrollHeight;if(sc>1)sc=1;
    w.style.transformOrigin='top center';w.style.transform='scale('+sc+')';
  }

  // ---- クリック委譲 ----
  document.addEventListener('click',function(e){
    var t=e.target.closest('[data-act]');if(!t)return;
    var act=t.dataset.act;
    if(act==='pref')cyclePref(parseInt(t.dataset.d));
    else if(act==='time')openWheel(parseInt(t.dataset.d));
    else if(act==='fill')fillAll(t.dataset.v);
    else if(act==='build')buildCode();
    else if(act==='fit')toggleFit();
  });

  renderCal();
})();
</script>
</body>
</html>
