<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>シフト確認</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Zen Kaku Gothic New',sans-serif;background:#f4f1ea;color:#2b2724;line-height:1.6;padding:18px 14px 60px}
.wrap{max-width:760px;margin:0 auto}
h1{font-family:'Zen Maru Gothic',sans-serif;font-size:23px;font-weight:900;display:flex;align-items:center;gap:10px}
h1 .dot{width:12px;height:12px;border-radius:50%;background:#d8602e;box-shadow:0 0 0 4px #fbe9df}
.bar{margin:16px 0}
.bar label{font-size:13px;color:#8a8378;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
select{font-family:inherit;font-size:15px;padding:9px 12px;border:1px solid #e3ddd0;border-radius:10px;background:#fffdf8;color:#2b2724}
.pbtn{font-family:inherit;font-size:13px;font-weight:700;padding:9px 14px;border:1px solid #e3ddd0;border-radius:10px;background:#fffdf8;color:#2b2724;cursor:pointer}
.card{background:#fffdf8;border:1px solid #e3ddd0;border-radius:14px;padding:16px;margin:12px 0;box-shadow:0 6px 18px rgba(43,39,36,.05)}
.cnt{font-size:15px}.cnt b{font-family:'Zen Maru Gothic';font-size:22px;color:#d8602e;margin:0 3px}
.empty{color:#8a8378;padding:10px 4px}
.legend2{font-size:11px;color:#8a8378;margin:6px 0 12px;line-height:1.5}
.foot{color:#a89f90;font-size:11px;margin-top:24px;text-align:center}
.vweeks{display:flex;flex-direction:column;gap:10px;width:100%;min-width:0}
.vweek{display:grid;grid-template-columns:minmax(44px,.9fr) repeat(7,minmax(0,1fr));gap:0;width:100%;min-width:0;align-items:stretch}
.vnamecol,.vcell{min-width:0;background:#fffdf8;border:1.5px solid #d8cfbd;border-left-width:0;overflow:hidden}
.vnamecol{border-left-width:1.5px}
.vcell.we{background:#fdf7f5}
.vcell.blank{background:transparent;border-color:transparent}
.vhead,.vnamehead{height:24px;border-bottom:1px solid #eee7da}
.vhead{font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:11px;line-height:1.2;padding:3px;display:flex;justify-content:space-between;align-items:center}
.vhead.short{background:#fce9a3}
.vdw{font-size:8px;color:#8a8378;margin-left:1px}
.vcnt{margin-left:auto;font-family:'Zen Kaku Gothic New',sans-serif;font-size:8px;color:#8a8378;font-weight:400}
.vname{height:19px;font-weight:700;font-size:9px;line-height:1.2;padding:1px 2px;display:flex;align-items:center;white-space:nowrap;border-bottom:1px solid #eee7da;overflow:hidden}
.vname.cmaru{color:#2f9e6f}.vname.csankaku{color:#d99a26}.vname.cbatsu{color:#c2bcb1;font-weight:500}
.vline{height:19px;display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);font-size:8px;line-height:1.15;text-align:center;border-bottom:1px solid #eee7da}
.vline>span{min-width:0;padding:1px;display:flex;align-items:center;justify-content:center;white-space:nowrap;overflow:hidden}
.vline>span+span{border-left:1px solid #eee7da}
.vmp{color:#7a756c;background:#ece9e2}
.vmp.cmaru{color:#2f9e6f}.vmp.csankaku{color:#d99a26}.vmp.cbatsu{color:#c2bcb1}
.vmw{color:#d8602e;font-weight:700}
.vmw.vwork{background:#f6c6a0}
.paste{display:flex;flex-direction:column;gap:10px}
.paste textarea{font-family:monospace;font-size:12px;width:100%;min-height:96px;border:1px solid #e3ddd0;border-radius:10px;padding:10px;background:#fffdf8;color:#2b2724;resize:vertical}
.btn{font-family:inherit;font-weight:700;font-size:14px;padding:10px 18px;border:none;border-radius:10px;background:#d8602e;color:#fff;cursor:pointer;align-self:flex-start}
.err{background:#fbe4e4;color:#a33;padding:10px 14px;border-radius:10px;font-size:13px}
@media(max-width:600px){
body{padding:10px 2px 50px}
.card{padding:10px 3px}
.vweeks{gap:6px}
.vweek{grid-template-columns:minmax(38px,.9fr) repeat(7,minmax(0,1fr))}
.vhead,.vnamehead{height:22px}
.vhead{font-size:8px;padding:2px 1px}.vdw,.vcnt{font-size:6px}
.vname{height:18px;font-size:7px;padding:1px}
.vline{height:18px;font-size:6px}
.vline>span{padding:1px 0}
}
</style>
</head>
<body>
<div class="wrap"><div id="app"></div>
<div class="foot">このシフト表は共有された時点の内容です。更新された場合は新しいリンク／コードを確認してください。</div></div>

<!-- ===== ビューア本体（素のJS・閲覧専用） ===== -->
<script>
(function(){
  "use strict";
  var WD=['日','月','火','水','木','金','土'];
  var HEADS=['日','月','火','水','木','金','土'];
  var D=null;           // 表示中のシフトデータ（展開後）
  var filter='all';     // 'all' または メンバーindex(number)

  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function isWE(dow){return dow===5||dow===6||dow===0;}
  function pcls(p){return p==='◯'?'cmaru':p==='△'?'csankaku':'cbatsu';}

  // 共有コード（LZString圧縮）→ 表示用データに展開
  // コンパクト形: {y,m,n:[名前],a:{日:[idx]},t:{'idx-日':'HH:MM'},p:{idx:{日:'◯|△'}},v:{idx:{日:'HH:MM'}}}
  function decodeShare(str){
    try{
      var j=LZString.decompressFromEncodedURIComponent((str||'').trim());
      if(!j)return null;
      var c=JSON.parse(j);
      if(!c||!c.n||!c.y)return null;
      return {
        year:c.y, month:c.m,
        members:c.n.map(function(name,i){return {id:i,name:name};}),
        assignments:c.a||{}, times:c.t||{}, prefs:c.p||{}, avail:c.v||{},
        dw:c.dw||0, de:c.de||0, ov:c.ov||{}
      };
    }catch(e){return null;}
  }

  function nameOf(id){var m=D.members[id];return m?m.name:'';}
  function timeOf(id,d){return D.times[id+'-'+d]||'';}
  function prefOf(id,d){return (D.prefs[id]&&D.prefs[id][d])||'×';}
  function availOf(id,d){return (D.avail[id]&&D.avail[id][d])||'';}
  function isIn(id,d){var a=D.assignments[d]||[];return a.indexOf(id)>=0;}
  function demandOf(d){var dow=new Date(D.year,D.month-1,d).getDay();var we=isWE(dow);return (D.ov&&D.ov[d]!=null)?D.ov[d]:(we?D.de:D.dw);}

  function renderShift(){
    var dim=new Date(D.year,D.month,0).getDate();
    var h='';
    h+='<h1><span class="dot"></span>'+D.year+'年 '+D.month+'月 シフト</h1>';
    h+='<div class="bar"><label>表示する人：<select id="f"><option value="all">全員</option>';
    for(var i=0;i<D.members.length;i++){var m=D.members[i];h+='<option value="'+m.id+'"'+(String(filter)===String(m.id)?' selected':'')+'>'+esc(m.name)+'</option>';}
    h+='</select></label>';
    h+='<button class="pbtn" id="fit">🔍 全体表示</button></div>';
    if(filter!=='all'){var cnt=0;for(var d0=1;d0<=dim;d0++){if(isIn(filter,d0))cnt++;}h+='<div class="card"><div class="cnt">'+esc(nameOf(filter))+' さんの出勤：<b>'+cnt+'</b>日</div></div>';}
    h+='<div class="legend2">左：名前　／　各日マス：希望(時刻 or ◯△×)・勤務時間　・　オレンジ＝採用　・　小さい時は「全体表示」や拡大で確認</div>';
    h+='<div class="vweeks">';
    var first=new Date(D.year,D.month-1,1).getDay();var off=first;
    var cells=[];for(var b=0;b<off;b++){cells.push(null);}
    for(var dd=1;dd<=dim;dd++){cells.push(dd);}
    while(cells.length%7!==0){cells.push(null);}
    var rows=filter==='all'?D.members:D.members.filter(function(mm){return mm.id===filter;});
    for(var wi=0;wi<cells.length;wi+=7){
      var week=cells.slice(wi,wi+7);
      h+='<div class="vweek">';
      h+='<div class="vnamecol"><div class="vnamehead"></div>';
      for(var nr=0;nr<rows.length;nr++){
        var nid=rows[nr].id;var best='×';
        for(var npk=0;npk<7;npk++){var npd=week[npk];if(npd){var npp=prefOf(nid,npd);if(npp==='◯'){best='◯';break;}if(npp==='△')best='△';}}
        h+='<div class="vname '+pcls(best)+'">'+esc(nameOf(nid))+'</div>';
      }
      h+='</div>';
      for(var k=0;k<7;k++){
        var d=week[k];
        if(!d){h+='<div class="vcell blank"></div>';continue;}
        var dow=new Date(D.year,D.month-1,d).getDay();var we=isWE(dow);
        var inCount=0;for(var z=0;z<D.members.length;z++){if(isIn(D.members[z].id,d))inCount++;}
        var def=demandOf(d);var short=def>0&&inCount<def;var cntHtml=def>0?(inCount+'/'+def):inCount;
        h+='<div class="vcell'+(we?' we':'')+'">';
        h+='<div class="vhead'+(short?' short':'')+'"><span>'+d+'<span class="vdw">'+WD[dow]+'</span></span><span class="vcnt">'+cntHtml+'</span></div>';
        for(var r=0;r<rows.length;r++){
          var id=rows[r].id;var p=prefOf(id,d);var inn=isIn(id,d);var av=availOf(id,d);var tm=timeOf(id,d);
          var wishCell=(p!=='×'&&av)?av:p;
          var workCell=inn?(tm||''):'';
          h+='<div class="vline">';
          h+='<span class="vmp '+pcls(p)+'">'+wishCell+'</span>';
          h+='<span class="vmw'+(inn?' vwork':'')+'">'+workCell+'</span>';
          h+='</div>';
        }
        h+='</div>';
      }
      h+='</div>';
    }
    h+='</div>';
    document.getElementById('app').innerHTML=h;
    document.getElementById('f').onchange=function(e){filter=e.target.value==='all'?'all':parseInt(e.target.value,10);renderShift();window.scrollTo(0,0);};
    document.getElementById('fit').onclick=toggleFit;
    fitNames();
  }

  // 左端の名前を1行に収まるよう自動縮小（縦折り返し防止）
  function fitNames(){
    var els=[].slice.call(document.querySelectorAll('.vname'));
    if(!els.length)return;
    els.forEach(function(el){el.style.fontSize='';});
    var want=els.map(function(el){var base=parseFloat(getComputedStyle(el).fontSize)||9;var sw=el.scrollWidth,cw=el.clientWidth;return (cw>2&&sw>cw)?Math.max(1,base*(cw-1)/sw):0;});
    els.forEach(function(el,i){if(want[i])el.style.fontSize=want[i].toFixed(1)+'px';});
  }

  function toggleFit(){
    var w=document.querySelector('.wrap');
    if(w.style.transform){w.style.transform='';w.style.transformOrigin='';return;}
    var sc=(window.innerHeight-16)/w.scrollHeight;if(sc>1)sc=1;
    w.style.transformOrigin='top center';w.style.transform='scale('+sc+')';
  }

  function renderPaste(msg){
    var h='<h1><span class="dot"></span>シフト確認</h1>';
    h+='<div class="card"><div class="legend2" style="margin:0 0 10px">共有リンクを開くとシフトが表示されます。リンクが開けない／表示されない場合は、管理者から届いた<b>共有コード</b>を下に貼り付けて「表示する」を押してください。</div>';
    if(msg)h+='<div class="err" style="margin-bottom:10px">'+esc(msg)+'</div>';
    h+='<div class="paste"><textarea id="code" placeholder="共有コードをここに貼り付け"></textarea><button class="btn" id="go">表示する ▶</button></div></div>';
    document.getElementById('app').innerHTML=h;
    document.getElementById('go').onclick=function(){
      var v=(document.getElementById('code').value||'').trim();
      if(!v)return;
      var dd=decodeShare(v);
      if(dd){D=dd;try{location.hash=v;}catch(e){}renderShift();window.scrollTo(0,0);}
      else renderPaste('コードを読み取れませんでした。コピーし直して、もう一度貼り付けてください。');
    };
  }

  function init(){
    var hash=(location.hash||'').replace(/^#/,'');
    if(hash)D=decodeShare(hash);
    if(D)renderShift();
    else renderPaste(hash?'リンクのデータを読み取れませんでした。下に共有コードを貼って読み込んでください。':'');
    window.addEventListener('hashchange',function(){
      var hh=(location.hash||'').replace(/^#/,'');
      if(!hh)return;
      var dd=decodeShare(hh);
      if(dd){D=dd;filter='all';renderShift();}
    });
  }

  init();
})();
</script>
</body>
</html>
